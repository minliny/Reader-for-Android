<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=390, user-scalable=no" />
    <title>导入本地书籍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/reader-design-tokens.css" />
    <link rel="stylesheet" href="../css/reader-components.css" />
    <link rel="stylesheet" href="../css/reader-screens.css" />
    <link rel="stylesheet" href="../css/reader-handoff-boundary.css" />
  </head>
  <body>
    <main class="reader-app-shell" data-screen-name="导入本地书籍">
      <header class="reader-page-header handoff-boundary"><h1 class="reader-page-title">导入本地书籍</h1><button class="reader-icon-button reader-control-icon" aria-label="更多"><span class="material-symbols-outlined">more_vert</span></button></header>
      <section class="reader-screen-content"><div class="reader-state-page"><h2 class="reader-state-title">选择本地文件</h2><p class="reader-state-message">支持 txt、epub 和常见文本文件，导入后进入书架。</p><button class="reader-primary-action">选择文件</button></div>      </section>
      <nav class="reader-main-tab-bar handoff-boundary" aria-label="主导航"><button class="reader-main-tab reader-main-tab-active" aria-label="书架"><span class="material-symbols-outlined">shelves</span><span>书架</span></button><button class="reader-main-tab " aria-label="搜索"><span class="material-symbols-outlined">search</span><span>搜索</span></button><button class="reader-main-tab " aria-label="发现"><span class="material-symbols-outlined">explore</span><span>发现</span></button><button class="reader-main-tab " aria-label="书源"><span class="material-symbols-outlined">hub</span><span>书源</span></button><button class="reader-main-tab " aria-label="设置"><span class="material-symbols-outlined">settings</span><span>设置</span></button></nav>
    </main>
  </body>
</html>
