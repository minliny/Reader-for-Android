<!DOCTYPE html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=390, user-scalable=no" /><title>阅读页自动翻页快捷弹窗 V2</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" /><link rel="stylesheet" href="../css/reader-design-tokens.css" /><link rel="stylesheet" href="../css/reader-components.css" /><link rel="stylesheet" href="../css/reader-control-layer.css" /><link rel="stylesheet" href="../css/reader-handoff-boundary.css" /></head>
  <body><main class="reader-page reader-auto-scroll-overlay">
    <section class="reader-content-layer handoff-boundary" aria-label="阅读正文"><h1 class="reader-content-title">深空信号</h1><article class="reader-content-body"><p>通讯台的指示灯已经闪烁了三个标准时。在这片被称为“寂静航线”的星域里，通常除了背景辐射的白噪音，什么也听不到。</p><p>“这不是随机的脉冲星信号，”领航员索菲亚走到他身后，“看这里的周期性间断，它有明显的结构。”</p><p>空间站外，恒星的光芒被一层稀薄的星云物质过滤，船舱内的维生系统发出平缓的嗡嗡声。</p><p>“求救信号。”艾伦打断了她，手指在控制台的触控板上快速滑过。</p></article></section>
    <nav class="reader-top-area handoff-boundary" aria-label="阅读页顶部信息"><div class="reader-top-bar"><div class="reader-top-leading"><button class="reader-icon-button reader-top-icon" aria-label="返回"><span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span></button></div><h1 class="reader-top-title">深空信号</h1><div class="reader-top-actions"><button class="reader-icon-button reader-top-icon" aria-label="刷新"><span class="material-symbols-outlined" data-icon="refresh">refresh</span></button><button class="reader-icon-button reader-top-icon" aria-label="换源"><span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span></button><button class="reader-icon-button reader-top-icon" aria-label="更多"><span class="material-symbols-outlined" data-icon="more_vert">more_vert</span></button></div></div><div class="reader-meta-row"><span>第一章：阿长与《山海经》</span><span class="reader-source-chip">本地书籍</span></div></nav>
    <section class="reader-overlay-panel reader-overlay-panel-quick-action handoff-boundary" aria-label="自动翻页弹窗"><div class="reader-panel-header"><h2 class="reader-panel-title">自动翻页</h2><span class="reader-panel-meta">状态：未开启</span></div><div class="reader-button-row"><button class="reader-action-button reader-action-button-primary">开始</button><button class="reader-action-button">暂停</button><button class="reader-action-button">停止</button></div><div class="reader-list-item"><div class="reader-list-main"><div class="reader-list-title">翻页速度</div><div class="reader-list-detail">中速 · 适合连续阅读</div></div></div><div class="reader-slider" aria-label="翻页速度"><div class="reader-slider-fill" style="width: 48%"></div><div class="reader-slider-thumb" style="left: 48%"></div></div><div class="reader-panel-meta">翻页方式</div><div class="reader-segmented"><span class="reader-segment reader-segment-active">滚动</span><span class="reader-segment">点击翻页</span><span class="reader-segment">连续滚动</span></div><div class="reader-panel-subtitle">开启后将在本章内按当前速度推进，不影响下方页内控制条。</div></section>
    <div class="reader-floating-quick-actions handoff-boundary" aria-label="快捷功能"><button class="reader-quick-circle-button" aria-label="搜索"><span class="material-symbols-outlined reader-quick-circle-icon" data-icon="search">search</span></button><button class="reader-quick-circle-button" aria-label="自动翻页"><span class="material-symbols-outlined reader-quick-circle-icon" data-icon="auto_mode">auto_mode</span></button><button class="reader-quick-circle-button" aria-label="内容替换"><span class="material-symbols-outlined reader-quick-circle-icon" data-icon="swap_horiz">swap_horiz</span></button><button class="reader-quick-circle-button" aria-label="夜间模式"><span class="material-symbols-outlined reader-quick-circle-icon" data-icon="dark_mode">dark_mode</span></button></div>
    <section class="reader-floating-page-control handoff-boundary" aria-label="本章内翻页控制"><button class="reader-icon-button reader-control-icon" aria-label="本章内上一页"><span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span></button><div class="reader-page-progress-track"><div class="reader-page-progress-fill"></div><div class="reader-page-progress-thumb"></div></div><button class="reader-icon-button reader-control-icon" aria-label="本章内下一页"><span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span></button></section>
    <footer class="reader-control-bottom-bar handoff-boundary" aria-label="阅读控制底栏"><button class="reader-icon-button reader-control-bottom-item" aria-label="目录"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="menu_book">menu_book</span><span class="reader-control-bottom-label">目录</span></button><button class="reader-icon-button reader-control-bottom-item" aria-label="朗读"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="record_voice_over">record_voice_over</span><span class="reader-control-bottom-label">朗读</span></button><button class="reader-icon-button reader-control-bottom-item" aria-label="界面"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="tune">tune</span><span class="reader-control-bottom-label">界面</span></button><button class="reader-icon-button reader-control-bottom-item" aria-label="设置"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="settings">settings</span><span class="reader-control-bottom-label">设置</span></button></footer>
  </main></body>
</html>
