<!DOCTYPE html>

  <head><meta charset="utf-8" /><meta name="viewport" content="width=390, user-scalable=no" /><title>阅读页朗读弹窗 V2</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" /><link rel="stylesheet" href="../css/reader-design-tokens.css" /><link rel="stylesheet" href="../css/reader-components.css" /><link rel="stylesheet" href="../css/reader-control-layer.css" /><link rel="stylesheet" href="../css/reader-handoff-boundary.css" /></head>
  <body><main class="reader-page reader-tts-overlay">
    <section class="reader-content-layer handoff-boundary" aria-label="阅读正文"><h1 class="reader-content-title">深空信号</h1><article class="reader-content-body"><p>通讯台的指示灯已经闪烁了三个标准时。在这片被称为“寂静航线”的星域里，通常除了背景辐射的白噪音，什么也听不到。</p><p>“这不是随机的脉冲星信号，”领航员索菲亚走到他身后，指着屏幕边缘的傅里叶变换图谱。</p></article></section>
    <nav class="reader-top-area handoff-boundary" aria-label="阅读页顶部信息"><div class="reader-top-bar"><div class="reader-top-leading"><button class="reader-icon-button reader-top-icon" aria-label="返回"><span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span></button></div><h1 class="reader-top-title">深空信号</h1><div class="reader-top-actions"><button class="reader-icon-button reader-top-icon" aria-label="刷新"><span class="material-symbols-outlined" data-icon="refresh">refresh</span></button><button class="reader-icon-button reader-top-icon" aria-label="换源"><span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span></button><button class="reader-icon-button reader-top-icon" aria-label="更多"><span class="material-symbols-outlined" data-icon="more_vert">more_vert</span></button></div></div><div class="reader-meta-row"><span>第一章：阿长与《山海经》</span><span class="reader-source-chip">本地书籍</span></div></nav>
    <section class="reader-overlay-panel reader-overlay-panel-bottom-function handoff-boundary" aria-label="朗读弹窗"><div class="reader-tts-groups reader-overlay-scroll"><div class="reader-tts-group"><div class="reader-panel-header"><h2 class="reader-panel-title">朗读</h2><span class="reader-panel-meta">正在朗读</span></div><div class="reader-panel-subtitle">当前章节：第一章：阿长与《山海经》</div></div><div class="reader-tts-group"><div class="reader-group-title">主播放控制</div><div class="reader-button-row"><button class="reader-action-button reader-action-button-primary">暂停</button><button class="reader-action-button">停止</button></div></div><div class="reader-tts-group"><div class="reader-panel-header"><span class="reader-panel-meta">00:38</span><span class="reader-panel-meta">08:12</span></div><div class="reader-slider"><div class="reader-slider-fill" style="width: 18%"></div><div class="reader-slider-thumb" style="left: 18%"></div></div></div><div class="reader-tts-group"><div class="reader-group-title">朗读参数</div><div class="reader-list-item"><div class="reader-list-main"><div class="reader-list-title">语速</div><div class="reader-slider"><div class="reader-slider-fill" style="width: 52%"></div><div class="reader-slider-thumb" style="left: 52%"></div></div></div></div><div class="reader-list-item"><div class="reader-list-main"><div class="reader-list-title">音量</div><div class="reader-slider"><div class="reader-slider-fill" style="width: 68%"></div><div class="reader-slider-thumb" style="left: 68%"></div></div></div></div><div class="reader-setting-item"><span class="reader-setting-name">定时关闭</span><span class="reader-setting-value">不开启 <span class="material-symbols-outlined reader-chevron">chevron_right</span></span></div><div class="reader-setting-item"><span class="reader-setting-name">朗读音色</span><span class="reader-setting-value">温和女声 <span class="material-symbols-outlined reader-chevron">chevron_right</span></span></div></div></div></section>
