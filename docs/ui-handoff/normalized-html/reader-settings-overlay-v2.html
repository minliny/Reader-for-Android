<!DOCTYPE html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=390, user-scalable=no" /><title>阅读页设置弹窗 V2</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" /><link rel="stylesheet" href="../css/reader-design-tokens.css" /><link rel="stylesheet" href="../css/reader-components.css" /><link rel="stylesheet" href="../css/reader-control-layer.css" /><link rel="stylesheet" href="../css/reader-handoff-boundary.css" /></head>
  <body><main class="reader-page reader-settings-overlay">
    <section class="reader-content-layer handoff-boundary" aria-label="阅读正文"><h1 class="reader-content-title">深空信号</h1><article class="reader-content-body"><p>通讯台的指示灯已经闪烁了三个标准时。在这片被称为“寂静航线”的星域里，通常除了背景辐射的白噪音，什么也听不到。</p><p>“这不是随机的脉冲星信号，”领航员索菲亚走到他身后，指着屏幕边缘的傅里叶变换图谱。</p></article></section>
    <nav class="reader-top-area handoff-boundary" aria-label="阅读页顶部信息"><div class="reader-top-bar"><div class="reader-top-leading"><button class="reader-icon-button reader-top-icon" aria-label="返回"><span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span></button></div><h1 class="reader-top-title">深空信号</h1><div class="reader-top-actions"><button class="reader-icon-button reader-top-icon" aria-label="刷新"><span class="material-symbols-outlined" data-icon="refresh">refresh</span></button><button class="reader-icon-button reader-top-icon" aria-label="换源"><span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span></button><button class="reader-icon-button reader-top-icon" aria-label="更多"><span class="material-symbols-outlined" data-icon="more_vert">more_vert</span></button></div></div><div class="reader-meta-row"><span>第一章：阿长与《山海经》</span><span class="reader-source-chip">本地书籍</span></div></nav>
    <section class="reader-overlay-panel reader-overlay-panel-bottom-function handoff-boundary" aria-label="设置弹窗"><div class="reader-panel-header"><h2 class="reader-panel-title">设置</h2><span class="reader-panel-meta">阅读行为</span></div><div class="reader-setting-list reader-overlay-scroll"><div class="reader-setting-item"><span class="reader-setting-name">屏幕方向</span><span class="reader-setting-value">跟随系统</span></div><div class="reader-setting-item"><span class="reader-setting-name">屏幕超时</span><span class="reader-setting-value">5 分钟</span></div><div class="reader-setting-item"><span class="reader-setting-name">隐藏状态栏</span><span class="reader-switch reader-switch-on"></span></div><div class="reader-setting-item"><span class="reader-setting-name">单双页</span><span class="reader-setting-value">自动</span></div><div class="reader-setting-item"><span class="reader-setting-name">进度条行为</span><span class="reader-setting-value">控制层显示</span></div><div class="reader-setting-item"><span class="reader-setting-name">文字两端对齐</span><span class="reader-switch reader-switch-on"></span></div><div class="reader-setting-item"><span class="reader-setting-name">文字底部对齐</span><span class="reader-switch"></span></div><div class="reader-setting-item"><span class="reader-setting-name">音量键翻页</span><span class="reader-switch reader-switch-on"></span></div><div class="reader-setting-item"><span class="reader-setting-name">单手翻页</span><span class="reader-switch"></span></div></div></section>
    <footer class="reader-control-bottom-bar handoff-boundary" aria-label="阅读控制底栏"><button class="reader-icon-button reader-control-bottom-item" aria-label="目录"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="menu_book">menu_book</span><span class="reader-control-bottom-label">目录</span></button><button class="reader-icon-button reader-control-bottom-item" aria-label="朗读"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="record_voice_over">record_voice_over</span><span class="reader-control-bottom-label">朗读</span></button><button class="reader-icon-button reader-control-bottom-item" aria-label="界面"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="tune">tune</span><span class="reader-control-bottom-label">界面</span></button><button class="reader-icon-button reader-control-bottom-item" aria-label="设置"><span class="material-symbols-outlined reader-control-bottom-icon" data-icon="settings">settings</span><span class="reader-control-bottom-label">设置</span></button></footer>
  </main></body>
</html>
