<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1f1b17",
                        "tertiary-fixed": "#c7ecc3",
                        "surface-tint": "#39637b",
                        "surface-container-highest": "#eae1da",
                        "tertiary": "#436443",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#643d2b",
                        "inverse-surface": "#34302b",
                        "error": "#ba1a1a",
                        "secondary": "#7f5441",
                        "on-surface-variant": "#41484c",
                        "on-tertiary-container": "#f7fff2",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#022108",
                        "on-secondary-container": "#79503c",
                        "surface-container-high": "#efe7e0",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "background": "#fff8f4",
                        "tertiary-fixed-dim": "#abd0a8",
                        "secondary-container": "#fec5ad",
                        "on-primary-container": "#fcfcff",
                        "primary": "#366179",
                        "on-error-container": "#93000a",
                        "surface": "#fff8f4",
                        "surface-bright": "#fff8f4",
                        "on-background": "#1f1b17",
                        "primary-fixed": "#c4e7ff",
                        "on-primary-fixed-variant": "#1e4b62",
                        "secondary-fixed": "#ffdbcc",
                        "on-primary-fixed": "#001e2c",
                        "surface-variant": "#eae1da",
                        "primary-container": "#507a92",
                        "surface-container-low": "#fbf2eb",
                        "surface-container": "#f5ece6",
                        "outline": "#72787d",
                        "surface-dim": "#e1d8d2",
                        "outline-variant": "#c1c7cd",
                        "primary-fixed-dim": "#a1cce8",
                        "inverse-on-surface": "#f8efe8",
                        "inverse-primary": "#a1cce8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "xl": "80px",
                        "max-content-width": "720px",
                        "xs": "8px",
                        "sm": "12px",
                        "touch-target": "48px",
                        "base": "4px",
                        "sidebar-width": "320px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter", "Noto Sans SC"],
                        "headline-lg-mobile": ["Inter", "Noto Sans SC"],
                        "headline-lg": ["Inter", "Noto Sans SC"],
                        "label-md": ["Inter", "Noto Sans SC"],
                        "display-lg": ["Inter", "Noto Sans SC"],
                        "body-lg": ["Inter", "Noto Sans SC"],
                        "body-md": ["Inter", "Noto Sans SC"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "30px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "26px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #fff8f4;
            color: #1f1b17;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="min-h-screen font-body-md text-body-md selection:bg-secondary-container">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface flex items-center justify-between px-4 w-full h-touch-target border-b border-outline-variant">
<button class="w-10 h-10 flex items-center justify-start text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-lg font-semibold text-on-surface">分组管理</h1>
<button class="w-10 h-10 flex items-center justify-end text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</header>
<!-- Content Canvas -->
<main class="pt-[48px] pb-xl max-w-max-content-width mx-auto px-md">
<!-- Group List Container -->
<div class="mt-sm space-y-base">
<!-- Fixed Section Header -->
<div class="py-sm">
<span class="font-label-md text-label-md text-on-surface-variant opacity-70">固定分组</span>
</div>
<!-- List Item: 全部 -->
<div class="flex items-center justify-between bg-surface-container-low rounded-lg h-[64px] px-4">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline-variant opacity-30 cursor-not-allowed" data-icon="drag_indicator">drag_indicator</span>
<span class="font-body-md text-on-surface">全部</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-md text-on-surface-variant">128 本</span>
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- List Item: 默认分组 -->
<div class="flex items-center justify-between bg-surface-container-low rounded-lg h-[64px] px-4">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline-variant opacity-30 cursor-not-allowed" data-icon="drag_indicator">drag_indicator</span>
<span class="font-body-md text-on-surface">默认分组</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-md text-on-surface-variant">36 本</span>
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- List Item: 本地书 -->
<div class="flex items-center justify-between bg-surface-container-low rounded-lg h-[64px] px-4">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline-variant opacity-30 cursor-not-allowed" data-icon="drag_indicator">drag_indicator</span>
<span class="font-body-md text-on-surface">本地书</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-md text-on-surface-variant">12 本</span>
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- Custom Section Header -->
<div class="py-sm pt-md">
<span class="font-label-md text-label-md text-on-surface-variant opacity-70">自定义分组</span>
</div>
<!-- List Item: 玄幻 -->
<div class="flex items-center justify-between bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors active:scale-[0.99] cursor-grab h-[64px] px-4">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="drag_indicator">drag_indicator</span>
<span class="font-body-md text-on-surface">玄幻</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-md text-on-surface-variant">20 本</span>
<span class="material-symbols-outlined text-outline-variant text-[20px]" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- List Item: 待读 -->
<div class="flex items-center justify-between bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors active:scale-[0.99] cursor-grab h-[64px] px-4">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="drag_indicator">drag_indicator</span>
<span class="font-body-md text-on-surface">待读</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-md text-on-surface-variant">8 本</span>
<span class="material-symbols-outlined text-outline-variant text-[20px]" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</div>
<!-- Footer Hint -->
<footer class="mt-xl text-center">
<p class="font-label-md text-label-md text-on-surface-variant opacity-60">
                长按或拖拽可调整分组顺序
            </p>
</footer>
</main>
</body></html>
