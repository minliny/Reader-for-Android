<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1f1b17",
                        "tertiary-fixed": "#c7ecc3",
                        "surface-tint": "#39637b",
                        "surface-container-highest": "#eae1da",
                        "tertiary": "#436443",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#643d2b",
                        "inverse-surface": "#34302b",
                        "error": "#ba1a1a",
                        "secondary": "#7f5441",
                        "on-surface-variant": "#41484c",
                        "on-tertiary-container": "#f7fff2",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#022108",
                        "on-secondary-container": "#79503c",
                        "surface-container-high": "#efe7e0",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "background": "#fff8f4",
                        "tertiary-fixed-dim": "#abd0a8",
                        "secondary-container": "#fec5ad",
                        "on-primary-container": "#fcfcff",
                        "primary": "#366179",
                        "on-error-container": "#93000a",
                        "surface": "#fff8f4",
                        "surface-bright": "#fff8f4",
                        "on-background": "#1f1b17",
                        "primary-fixed": "#c4e7ff",
                        "on-primary-fixed-variant": "#1e4b62",
                        "secondary-fixed": "#ffdbcc",
                        "on-primary-fixed": "#001e2c",
                        "surface-variant": "#eae1da",
                        "primary-container": "#507a92",
                        "surface-container-low": "#fbf2eb",
                        "surface-container": "#f5ece6",
                        "outline": "#72787d",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#301305",
                        "on-tertiary-fixed-variant": "#2e4e30",
                        "secondary-fixed-dim": "#f2baa2",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#5b7d5a",
                        "surface-dim": "#e1d8d2",
                        "outline-variant": "#c1c7cd",
                        "primary-fixed-dim": "#a1cce8",
                        "inverse-on-surface": "#f8efe8",
                        "inverse-primary": "#a1cce8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "xl": "80px",
                        "max-content-width": "720px",
                        "xs": "8px",
                        "sm": "12px",
                        "touch-target": "48px",
                        "base": "4px",
                        "sidebar-width": "320px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "26px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fff8f4;
            color: #1f1b17;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md relative overflow-hidden">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 bg-surface flex items-center justify-between px-md w-full h-touch-target border-b border-outline-variant">
<div class="flex items-center gap-sm">
<button class="w-touch-target h-touch-target flex items-center justify-center text-primary active:scale-95 transition-transform rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-semibold text-on-surface">分组管理</h1>
</div>
<div class="flex items-center">
<button class="w-touch-target h-touch-target flex items-center justify-center text-primary active:scale-95 transition-transform rounded-full">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</header>
<!-- Main Content: Groups List (Background Content) -->
<main class="flex-1 max-w-max-content-width mx-auto w-full px-md py-lg space-y-md opacity-40 select-none pointer-events-none">
<div class="space-y-sm">
<h2 class="font-label-md text-label-md text-on-surface-variant px-base">现有分组</h2>
<div class="bg-surface-container border border-outline-variant rounded-lg overflow-hidden">
<div class="flex items-center justify-between p-md border-b border-outline-variant">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="folder">folder</span>
<span class="text-on-surface">古典文学</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</div>
<div class="flex items-center justify-between p-md border-b border-outline-variant">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="folder">folder</span>
<span class="text-on-surface">科幻小说</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</div>
<div class="flex items-center justify-between p-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="folder">folder</span>
<span class="text-on-surface">未分类</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</div>
</div>
</div>
</main>
<!-- Modal Overlay (Solid UI, No Glassmorphism) -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-md bg-on-surface/40">
<!-- Dialog Container -->
<div class="bg-surface-container-lowest w-full max-w-[320px] rounded-xl shadow-2xl border border-outline-variant overflow-hidden">
<!-- Header -->
<div class="px-md pt-md pb-sm">
<h3 class="font-headline-md text-headline-md text-on-surface">新增分组</h3>
</div>
<!-- Body -->
<div class="px-md py-sm">
<div class="space-y-base">
<div class="relative group">
<input autofocus="" class="w-full h-[52px] px-md bg-surface-container-low border-b-2 border-primary focus:border-primary outline-none text-on-surface placeholder:text-on-surface-variant/40 font-body-md" placeholder="请输入分组名称" type="text">
</div>
<p class="font-label-md text-label-md text-on-surface-variant px-base">分组将帮助您更好地组织您的阅读源</p>
</div>
</div>
<!-- Actions -->
<div class="flex justify-end items-center gap-sm p-sm mt-sm">
<button class="px-md h-touch-target font-label-md text-label-md text-primary hover:bg-surface-container-high transition-colors rounded-lg active:scale-95">
                    取消
                </button>
<button class="px-md h-touch-target font-label-md text-label-md bg-primary text-on-primary hover:brightness-110 transition-all rounded-lg shadow-sm active:scale-95">
                    确定
                </button>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed bottom-0 left-0 right-0 h-1/4 pointer-events-none opacity-5 flex justify-center items-end p-xl">
<div class="flex gap-lg">
<div class="w-32 h-48 bg-on-surface rounded-sm"></div>
<div class="w-32 h-48 bg-on-surface rounded-sm"></div>
<div class="w-32 h-48 bg-on-surface rounded-sm"></div>
</div>
</div>
</body></html>
