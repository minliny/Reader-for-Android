<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #fff8f4; /* background color from theme */
        }

    body {

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md">
<!-- TopAppBar - Based on Shared Component JSON -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline h-touch-target flex items-center justify-between px-md w-full">
<div class="flex items-center">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform p-2 rounded-full" data-icon="arrow_back">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<h1 class="font-headline-md text-headline-md font-semibold text-on-surface dark:text-on-surface">分组管理</h1>
<div class="flex items-center">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform p-2 rounded-full" data-icon="add">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-md pt-xl">
<div class="max-w-max-content-width w-full flex flex-col items-center text-center">
<!-- Weakened Book Icon Area -->
<div class="mb-lg opacity-20 text-on-surface-variant">
<div class="w-32 h-32 flex items-center justify-center bg-surface-container-high rounded-xl">
<span class="material-symbols-outlined text-[80px]" style="font-variation-settings: 'wght' 200;">auto_stories</span>
</div>
</div>
<!-- Empty State Typography -->
<div class="space-y-sm mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface">暂无自定义分组</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    还没有自定义分组，你可以新建分组，用来整理书架中的书籍。
                </p>
</div>
<!-- Action Area: Seal Blue Button -->
<button class="group relative flex items-center justify-center gap-xs bg-primary text-on-primary px-xl py-sm rounded-full font-label-md text-label-md hover:brightness-110 active:scale-95 transition-all shadow-sm">
<span class="material-symbols-outlined" data-icon="create_new_folder">create_new_folder</span>
<span class="">新增分组</span>
</button>
</div>
</main>
<!-- Decorative Bottom Detail (Minimalist layout doesn't require footer nav here for management screen) -->
<div class="h-md w-full"></div>
<!-- Background Texture/Visual Context Image (Subtle) -->
<div class="fixed inset-0 -z-10 opacity-[0.03] pointer-events-none overflow-hidden">
