<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设置组件拆分</title>
    <link rel="stylesheet" href="./components.css">
  </head>
  <body>
    <main class="settings-component-reference" aria-label="设置组件拆分">
<section data-component="SettingsHome">
  <div data-slot="StatusBar">SettingsStatusBar</div>
  <div data-slot="TopBar">SettingsTopBar</div>
  <div data-slot="Overview">LocalOverviewCard</div>
  <div data-slot="QuickEntries">QuickEntryGrid</div>
  <div data-slot="Sections">SettingsSection / SettingsListItem</div>
  <div data-slot="MainNav">MainNav</div>
</section>

<section data-component="LocalOverviewCard">
  <div data-prop="title">本地概览</div>
  <div data-prop="items">本地书籍、订阅源、书源可用、最近备份</div>
</section>

<section data-component="SettingsSection">
  <div data-prop="title">全部设置</div>
  <div data-prop="items">通用、阅读、书架与搜索、书源与订阅、同步与备份、隐私与权限、关于与反馈</div>
</section>
    </main>
  </body>
</html>
