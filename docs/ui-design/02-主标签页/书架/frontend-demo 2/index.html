<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>书架前端页面 Demo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-frame" aria-label="Reader bookshelf demo">
    <section class="phone" aria-label="书架">
      <header class="status-bar" aria-label="系统状态栏">
        <span>10:30</span>
        <span class="system-icons" aria-hidden="true">
          <span class="wifi"></span>
          <span class="signal"></span>
          <span class="battery"></span>
          <span>82%</span>
        </span>
      </header>

      <section class="top-bar" aria-label="顶部栏">
        <h1>书架</h1>
        <div class="top-actions">
          <button class="icon-button" type="button" data-action="search" aria-label="搜索">
            <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="21" cy="21" r="13"></circle><path d="M31 31 42 42"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="more" aria-label="更多">
            <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="10" r="3"></circle><circle cx="24" cy="24" r="3"></circle><circle cx="24" cy="38" r="3"></circle></svg>
          </button>
        </div>
      </section>

      <form class="search-panel" id="searchPanel" hidden>
        <label class="search-box">
          <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="21" cy="21" r="13"></circle><path d="M31 31 42 42"></path></svg>
          <input id="searchInput" type="search" placeholder="搜索书名、作者或章节">
        </label>
        <button type="button" class="text-button" data-action="close-search">取消</button>
      </form>

      <nav class="chip-row" id="groupChips" aria-label="书架分组"></nav>

      <section class="summary-row" aria-label="顶部信息模块">
        <article class="summary-card continue-card" id="continueCard"></article>
        <article class="summary-card recent-card" id="recentCard"></article>
      </section>

      <section class="section-head" aria-label="我的书架工具栏">
        <h2>我的书架</h2>
        <div class="section-tools">
          <button class="mode-button" type="button" data-action="toggle-mode" aria-label="切换封面列表模式">
            <span id="modeLabel">封面</span>
          </button>
          <button class="icon-button subtle" type="button" data-action="sort" aria-label="排序筛选">
            <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M8 13h22"></path><path d="M8 24h16"></path><path d="M8 35h10"></path><path d="M34 12v22"></path><path d="m27 28 7 7 7-7"></path></svg>
          </button>
          <button class="icon-button subtle" type="button" data-action="display" aria-label="展示设置">
            <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="7"></circle><path d="M24 5v6M24 37v6M7.5 14.5l5.2 3M35.3 30.5l5.2 3M7.5 33.5l5.2-3M35.3 17.5l5.2-3M5 24h6M37 24h6"></path></svg>
          </button>
        </div>
      </section>

      <section class="content-scroll" aria-live="polite">
        <div id="bookCollection"></div>
        <section class="empty-state" id="emptyState" hidden>
          <h3>书架还是空的</h3>
          <p>搜索书籍或导入本地文件后，会在这里显示。</p>
          <div class="empty-actions">
            <button type="button" class="primary-action">去搜索</button>
            <button type="button" class="secondary-action">导入本地书</button>
          </div>
        </section>
      </section>

      <nav class="bottom-nav" aria-label="底部主导航">
        <button class="nav-item active" type="button" aria-current="page" data-tab="书架">
          <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 10c5 0 9 1.5 12 5v25c-3-3.5-7-5-12-5V10Z"></path><path d="M36 10c-5 0-9 1.5-12 5v25c3-3.5 7-5 12-5V10Z"></path></svg>
          <span>书架</span>
        </button>
        <button class="nav-item" type="button" data-tab="发现">
          <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="16"></circle><path d="m30 17-4 12-8 4 4-12 8-4Z"></path></svg>
          <span>发现</span>
        </button>
        <button class="nav-item" type="button" data-tab="RSS">
          <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M10 30a8 8 0 0 1 8 8"></path><path d="M10 20a18 18 0 0 1 18 18"></path><path d="M10 10a28 28 0 0 1 28 28"></path><circle cx="13" cy="35" r="2"></circle></svg>
          <span>RSS</span>
        </button>
        <button class="nav-item" type="button" data-tab="设置">
          <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="7"></circle><path d="M24 5v6M24 37v6M7.5 14.5l5.2 3M35.3 30.5l5.2 3M7.5 33.5l5.2-3M35.3 17.5l5.2-3M5 24h6M37 24h6"></path></svg>
          <span>设置</span>
        </button>
      </nav>

      <div class="scrim" id="scrim" hidden></div>
      <aside class="bottom-sheet" id="bottomSheet" aria-modal="true" role="dialog" hidden></aside>
      <div class="toast" id="toast" hidden></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
