<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>发现首页组件拆分</title>
    <link rel="stylesheet" href="./components.css">
    <style>
      body {
        width: 1180px;
        min-height: 1600px;
        padding: 40px;
      }

      .ds-components-board {
        display: grid;
        gap: 24px;
        width: 1100px;
        font-family: var(--ds-sans);
      }

      .ds-components-board h1 {
        margin: 0;
        font-size: 34px;
      }

      .ds-component-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      .ds-component-tile {
        overflow: hidden;
        border: 1px solid var(--ds-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
      }

      .ds-component-tile h2 {
        margin: 0;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(180, 166, 151, 0.32);
        font-size: 20px;
      }

      .ds-component-demo {
        padding: 24px;
      }

      .ds-component-demo .ds-card,
      .ds-component-demo .ds-source-status {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main class="ds-components-board">
      <h1>发现首页组件拆分</h1>
      <div class="ds-component-grid">
        <article class="ds-component-tile">
          <h2>SearchEntry</h2>
          <div class="ds-component-demo" id="search-entry"></div>
        </article>
        <article class="ds-component-tile">
          <h2>SourceControls</h2>
          <div class="ds-component-demo" id="source-controls"></div>
        </article>
        <article class="ds-component-tile">
          <h2>DiscoveryContentCard</h2>
          <div class="ds-component-demo" id="content-card"></div>
        </article>
        <article class="ds-component-tile">
          <h2>Ranking / SourceStatus</h2>
          <div class="ds-component-demo" id="ranking-card"></div>
        </article>
      </div>
    </main>
    <script src="../../shared-main-tab-kit/kit.js"></script>
    <script src="./fixture.js"></script>
    <script src="./render.js"></script>
    <script>
      const data = window.DISCOVERY_HOME_FIXTURE;
      function mountNodes(id, selectors) {
        const host = document.getElementById(id);
        const temp = document.createElement("div");
        window.DiscoveryHomeInput.renderDiscoveryHome(temp, data);
        host.replaceChildren();
        selectors.forEach((selector) => {
          const node = temp.querySelector(selector);
          if (node) host.appendChild(node);
        });
      }

      document.getElementById("search-entry").innerHTML = '<button class="ds-search-entry" type="button"><span class="ds-search-entry-icon"><svg class="ds-icon" viewBox="0 0 48 48"><circle cx="21" cy="21" r="13"></circle><path d="M31 31 42 42"></path></svg></span><span>' + data.search.placeholder + '</span></button>';
      mountNodes("source-controls", [".ds-source-card", ".ds-category-card"]);
      mountNodes("content-card", [".ds-content-card"]);
      mountNodes("ranking-card", [".ds-source-status", ".ds-ranking-card"]);
    </script>
  </body>
</html>
