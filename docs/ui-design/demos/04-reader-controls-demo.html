<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>04 阅读控制层 Demo</title>
  <style>
    :root {
      --paper: #f7efe3;
      --paper-deep: #eee1cf;
      --card: rgba(255, 252, 246, 0.92);
      --card-solid: #fffaf1;
      --ink: #15120f;
      --muted: #6f655b;
      --line: #e2d6c7;
      --blue: #16729a;
      --blue-dark: #0b5f85;
      --track: #e2d8ca;
      --soft: rgba(245, 240, 232, 0.86);
      --shadow: 0 10px 28px rgba(90, 68, 43, 0.16);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 9px;
      font-family: "Songti SC", "Noto Serif CJK SC", "STSong", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #2b2a28;
      color: var(--ink);
    }

    .phone {
      position: relative;
      width: 390px;
      height: 884px;
      overflow: hidden;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.6), transparent 32%),
        radial-gradient(circle at 70% 78%, rgba(232,216,190,0.34), transparent 38%),
        linear-gradient(90deg, rgba(90,65,32,0.035), transparent 18%, rgba(94,68,42,0.035) 49%, transparent 80%),
        var(--paper);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.34;
      background:
        linear-gradient(90deg, transparent 0, rgba(84, 64, 38, 0.06) 48%, transparent 51%),
        repeating-linear-gradient(90deg, rgba(120, 85, 40, 0.018) 0 1px, transparent 1px 17px);
      mix-blend-mode: multiply;
    }

    .status {
      position: absolute;
      top: 18px;
      left: 22px;
      right: 22px;
      display: flex;
      justify-content: space-between;
      font: 14px/1.2 "PingFang SC", "Noto Sans CJK SC", sans-serif;
      color: #6b6259;
      letter-spacing: 0;
      z-index: 2;
    }

    .top-card {
      position: absolute;
      top: 43px;
      left: 13px;
      right: 13px;
      height: 59px;
      display: grid;
      grid-template-columns: 42px 1fr 54px 28px;
      align-items: center;
      padding: 0 17px;
      border: 1px solid rgba(184, 169, 150, 0.55);
      border-radius: 15px;
      background: var(--card);
      box-shadow: var(--shadow);
      z-index: 4;
      font-family: "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }

    .icon-svg {
      display: block;
      width: 24px;
      height: 24px;
      color: #111;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .icon-svg.back-icon {
      width: 28px;
      height: 28px;
      stroke-width: 2.55;
    }

    .book-title {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .book-title strong {
      font-size: 18px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0;
    }

    .book-title span {
      font-size: 12px;
      color: #2f2a25;
      white-space: nowrap;
    }

    .source {
      display: grid;
      justify-items: center;
      gap: 1px;
      font-size: 12px;
      color: #1e1c19;
    }

    .source .icon-svg {
      width: 24px;
      height: 21px;
      stroke-width: 2.25;
    }

    .kebab-icon {
      justify-self: end;
      width: 24px;
      height: 24px;
      fill: #111;
      stroke: none;
    }

    .reader-text {
      position: absolute;
      top: 126px;
      left: 34px;
      right: 34px;
      font-size: 19px;
      line-height: 2.12;
      letter-spacing: 0.04em;
      color: #15110f;
      z-index: 1;
    }

    .reader-text p {
      margin: 0 0 18px;
      text-indent: 2em;
    }

    .reader-text p:first-child {
      text-indent: 4em;
    }

    .control-sheet {
      position: absolute;
      left: 11px;
      right: 11px;
      bottom: 23px;
      height: 289px;
      border: 1px solid rgba(193, 178, 158, 0.7);
      border-radius: 17px 17px 0 0;
      background: rgba(255, 251, 242, 0.9);
      box-shadow: 0 -10px 28px rgba(91, 72, 48, 0.13);
      z-index: 5;
      padding: 19px 11px 12px;
      font-family: "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }

    .grabber {
      position: absolute;
      top: 8px;
      left: 50%;
      width: 32px;
      height: 3px;
      transform: translateX(-50%);
      border-radius: 8px;
      background: #b7ab9c;
    }

    .left-controls {
      width: calc(100% - 62px);
      display: grid;
      grid-template-rows: 82px 76px 69px;
      gap: 10px;
    }

    .quick-row,
    .chapter-card,
    .tabs {
      border: 1px solid var(--line);
      background: rgba(255, 252, 246, 0.74);
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(120, 93, 55, 0.045);
    }

    .quick-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      padding: 9px 12px 8px;
    }

    .action {
      display: grid;
      justify-items: center;
      gap: 5px;
      font-size: 12px;
    }

    .icon-box {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(235, 238, 236, 0.78);
    }

    .icon-box .icon-svg {
      width: 25px;
      height: 25px;
      stroke-width: 2.25;
    }

    .icon-svg .solid {
      fill: currentColor;
      stroke: none;
    }

    .chapter-card {
      padding: 13px 13px 9px;
      display: grid;
      align-content: start;
      gap: 11px;
    }

    .chapter-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chapter-top strong {
      font-size: 17px;
      letter-spacing: 0.04em;
    }

    .chapter-actions {
      display: flex;
      gap: 8px;
    }

    .pill {
      border: 1px solid #e3d7c8;
      background: rgba(247, 242, 235, 0.9);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      color: #3c342e;
    }

    .progress {
      height: 18px;
      position: relative;
    }

    .progress .track {
      position: absolute;
      top: 8px;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--track);
    }

    .progress .fill {
      position: absolute;
      top: 8px;
      left: 0;
      width: 38%;
      height: 3px;
      border-radius: 999px;
      background: var(--blue);
    }

    .progress .thumb {
      position: absolute;
      top: 2px;
      left: calc(38% - 8px);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--blue);
      border: 4px solid #f6f3ed;
      box-shadow: 0 0 0 1px rgba(15, 101, 139, 0.3);
    }

    .chapter-percent {
      font-size: 12px;
      color: var(--muted);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      padding: 10px 8px 8px;
    }

    .small-action {
      display: grid;
      justify-items: center;
      gap: 4px;
      font-size: 12px;
    }

    .small-icon {
      width: 31px;
      height: 31px;
      border-radius: 13px;
      background: rgba(235, 238, 236, 0.78);
      display: grid;
      place-items: center;
      font-size: 20px;
      color: #111;
      font-family: "PingFang SC", sans-serif;
    }

    .small-icon .icon-svg {
      width: 23px;
      height: 23px;
      stroke-width: 2.25;
    }

    .brightness {
      position: absolute;
      top: 19px;
      right: 8px;
      width: 52px;
      bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 252, 246, 0.74);
      display: grid;
      grid-template-rows: 24px 32px 1fr 34px 28px;
      justify-items: center;
      align-items: center;
      padding: 8px 0 10px;
      font-size: 12px;
    }

    .brightness .icon-svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.1;
    }

    .vertical-slider {
      position: relative;
      width: 18px;
      height: 80px;
    }

    .vertical-slider::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 999px;
      background: #dfd6ca;
    }

    .vertical-slider::after {
      content: "";
      position: absolute;
      left: 8px;
      bottom: 0;
      width: 3px;
      height: 45px;
      border-radius: 999px;
      background: var(--blue);
    }

    .v-thumb {
      position: absolute;
      left: 1px;
      bottom: 39px;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--blue);
      border: 5px solid #f8f5ef;
      box-shadow: 0 2px 7px rgba(0,0,0,0.16);
      z-index: 2;
    }

    .system-a {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f6f1e8;
      border: 1px solid #e2d7c8;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-family: "PingFang SC", sans-serif;
    }

    .bottom-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      font: 13px/1 "PingFang SC", sans-serif;
      color: #5e554d;
      background: rgba(248, 241, 230, 0.74);
      z-index: 4;
    }

    .book-progress {
      position: absolute;
      left: 0;
      bottom: 23px;
      width: 38%;
      height: 2px;
      background: var(--blue);
      z-index: 8;
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="04 阅读控制层前端复刻 demo">
    <div class="status">
      <span>长夜余火 · 第 32 章</span>
      <span>10:30</span>
    </div>

    <section class="top-card" aria-label="顶部阅读栏">
      <svg class="icon-svg back-icon" aria-hidden="true" viewBox="0 0 24 24">
        <path d="M19 12H5"></path>
        <path d="m12 19-7-7 7-7"></path>
      </svg>
      <div class="book-title">
        <strong>长夜余火</strong>
        <span>起点中文网 · 第 32 章</span>
      </div>
      <div class="source">
        <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M16 3h5v5"></path>
          <path d="M4 20 21 3"></path>
          <path d="M21 16v5h-5"></path>
          <path d="m15 15 6 6"></path>
          <path d="M4 4h4l4 4"></path>
        </svg>
        <span>换源</span>
      </div>
      <svg class="kebab-icon" aria-hidden="true" viewBox="0 0 24 24">
        <circle cx="12" cy="5" r="2"></circle>
        <circle cx="12" cy="12" r="2"></circle>
        <circle cx="12" cy="19" r="2"></circle>
      </svg>
    </section>

    <article class="reader-text" aria-label="阅读正文">
      <p>雨，下了一整夜。</p>
      <p>城市像是被泼了一盆凉水，街灯昏黄，水面反着光，连呼吸都带着潮气。</p>
      <p>他站在巷口，手里攥着那封信。纸已经被雨水润湿，边角微微卷起，字迹却依旧清晰。</p>
      <p>“等你回来。”</p>
      <p>没有署名，只有短短四个字。</p>
      <p>他笑了笑，笑得很轻，像是自言自语。然后转身，沿着雨声走进夜里。</p>
    </article>

    <section class="control-sheet" aria-label="阅读控制层">
      <div class="grabber" aria-hidden="true"></div>
      <div class="left-controls">
        <div class="quick-row" aria-label="快捷功能">
          <div class="action">
            <div class="icon-box">
              <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-4.5-4.5"></path>
              </svg>
            </div>
            <span>搜索</span>
          </div>
          <div class="action">
            <div class="icon-box">
              <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5.4 8A8 8 0 0 1 20 12"></path>
                <path d="M18.6 16A8 8 0 0 1 4 12"></path>
                <path d="m7 4-2.6 4H9"></path>
                <path d="m17 20 2.6-4H15"></path>
                <path class="solid" d="M10 8.7v6.6c0 .55.61.88 1.07.58l5.1-3.3a.7.7 0 0 0 0-1.16l-5.1-3.3A.7.7 0 0 0 10 8.7Z"></path>
              </svg>
            </div>
            <span>自动翻页</span>
          </div>
          <div class="action">
            <div class="icon-box">
              <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
                <path d="m17 2 4 4-4 4"></path>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                <path d="m7 22-4-4 4-4"></path>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
              </svg>
            </div>
            <span>替换</span>
          </div>
        </div>

        <div class="chapter-card" aria-label="章节进度">
          <div class="chapter-top">
            <strong>第 32 章 雨夜</strong>
            <div class="chapter-actions">
              <span class="pill">上一章</span>
              <span class="pill">下一章</span>
            </div>
          </div>
          <div class="progress" aria-hidden="true">
            <span class="track"></span>
            <span class="fill"></span>
            <span class="thumb"></span>
          </div>
          <span class="chapter-percent">本章 38%</span>
        </div>

        <div class="tabs" aria-label="阅读控制主按钮">
          <div class="small-action">
            <div class="small-icon">
              <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 6h13"></path>
                <path d="M8 12h13"></path>
                <path d="M8 18h13"></path>
                <circle class="solid" cx="4" cy="6" r="1.7"></circle>
                <circle class="solid" cx="4" cy="12" r="1.7"></circle>
                <circle class="solid" cx="4" cy="18" r="1.7"></circle>
              </svg>
            </div>
            <span>目录</span>
          </div>
          <div class="small-action">
            <div class="small-icon">
              <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5 10v4"></path>
                <path d="M9 7v10"></path>
                <path d="M13 4v16"></path>
                <path d="M17 8v8"></path>
                <path d="M21 11v2"></path>
              </svg>
            </div>
            <span>朗读</span>
          </div>
          <div class="small-action">
            <div class="small-icon">Aa</div>
            <span>界面</span>
          </div>
          <div class="small-action">
            <div class="small-icon">
              <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 2 20 7v10l-8 5-8-5V7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </div>
            <span>设置</span>
          </div>
        </div>
      </div>

      <aside class="brightness" aria-label="亮度">
        <strong>亮度</strong>
        <svg class="icon-svg" aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.42 1.42"></path>
          <path d="m17.65 17.65 1.42 1.42"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m4.93 19.07 1.42-1.42"></path>
          <path d="m17.65 6.35 1.42-1.42"></path>
        </svg>
        <div class="vertical-slider"><span class="v-thumb"></span></div>
        <div class="system-a">A</div>
        <span>系统</span>
      </aside>
    </section>

    <div class="book-progress" aria-hidden="true"></div>
    <footer class="bottom-info">
      <span>38%</span>
      <span>第 32 / 128 章</span>
    </footer>
  </main>
</body>
</html>
