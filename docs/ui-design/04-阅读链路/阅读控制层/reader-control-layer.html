<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=841, initial-scale=1">
  <title>阅读控制层</title>
  <style>
    :root {
      --paper: #fff8f1;
      --paper-deep: #f6ede2;
      --surface: rgba(255, 250, 244, 0.9);
      --surface-solid: #fffaf4;
      --surface-low: rgba(252, 245, 237, 0.92);
      --surface-rail: #eee2d4;
      --ink: #14110e;
      --muted: #6f665c;
      --soft: #8d847b;
      --primary: #2379a4;
      --primary-dark: #176996;
      --border: rgba(180, 166, 151, 0.42);
      --shadow: 0 18px 46px rgba(89, 70, 50, 0.16);
      --shadow-soft: 0 8px 26px rgba(89, 70, 50, 0.1);
      --serif: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 841px;
      min-height: 1870px;
      background: var(--paper);
      color: var(--ink);
    }

    body {
      font-family: var(--serif);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
    }

    .phone {
      position: relative;
      width: 841px;
      height: 1870px;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 7%, rgba(255, 255, 255, 0.82), transparent 31%),
        radial-gradient(circle at 80% 3%, rgba(255, 255, 255, 0.78), transparent 24%),
        linear-gradient(180deg, #fff9f2 0%, #fbf2e8 62%, #f5ebdf 100%);
    }

    .reading-haze {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0%, rgba(190, 172, 151, 0.08) 29%, transparent 44%, rgba(190, 172, 151, 0.08) 68%, transparent 100%),
        repeating-linear-gradient(90deg, rgba(120, 92, 66, 0.018) 0, rgba(120, 92, 66, 0.018) 1px, transparent 1px, transparent 42px);
      pointer-events: none;
    }

    .ambient-top {
      position: absolute;
      inset: 0 0 auto;
      height: 360px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.68), transparent);
      pointer-events: none;
    }

    .status-row {
      position: absolute;
      top: 39px;
      left: 45px;
      right: 43px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #625a51;
      font-family: var(--sans);
      font-size: 25px;
      line-height: 1;
    }

    .top-card {
      position: absolute;
      top: 90px;
      left: 26px;
      width: 789px;
      height: 126px;
      display: grid;
      grid-template-columns: 95px 1fr 102px 64px;
      align-items: center;
      border: 1px solid rgba(154, 139, 124, 0.35);
      border-radius: 24px;
      background: rgba(255, 250, 244, 0.9);
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px);
    }

    .top-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      justify-self: center;
      color: #10100f;
    }

    .top-icon svg,
    .module-icon svg,
    .quick-icon svg,
    .small-pill svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 3.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .book-info {
      min-width: 0;
      padding-top: 3px;
    }

    h1 {
      margin: 0 0 11px;
      color: #12100d;
      font-size: 35px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0;
    }

    .source-line {
      margin: 0;
      color: #3f3831;
      font-size: 25px;
      line-height: 1;
      letter-spacing: 0;
    }

    .swap-button {
      display: grid;
      justify-items: center;
      gap: 5px;
      color: #16130f;
      font-size: 22px;
      line-height: 1;
    }

    .swap-button svg {
      width: 36px;
      height: 36px;
      stroke-width: 3.5;
    }

    .more-dots {
      display: grid;
      justify-self: center;
      gap: 10px;
      padding-top: 2px;
    }

    .more-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #15120f;
    }

    .reading-copy {
      position: absolute;
      top: 230px;
      left: 73px;
      width: 696px;
      color: #14100d;
      font-size: 33px;
      line-height: 2.66;
      letter-spacing: 0;
    }

    .reading-copy p {
      margin: 0 0 23px;
      text-indent: 72px;
    }

    .control-sheet {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 58px;
      height: 610px;
      border: 1px solid rgba(164, 149, 132, 0.42);
      border-radius: 26px 26px 0 0;
      background: rgba(255, 250, 244, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .grabber {
      position: absolute;
      top: 17px;
      left: 50%;
      width: 69px;
      height: 8px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #b9ad9f;
    }

    .control-main {
      position: absolute;
      left: 22px;
      top: 39px;
      width: 606px;
      display: grid;
      gap: 22px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 252, 248, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 5px 18px rgba(92, 71, 50, 0.06);
    }

    .quick-panel {
      height: 171px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      padding: 0 32px;
    }

    .quick-action {
      display: grid;
      justify-items: center;
      gap: 16px;
      color: #161310;
      font-size: 24px;
      line-height: 1;
    }

    .quick-icon {
      width: 82px;
      height: 82px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: linear-gradient(180deg, #f0f2f0, #e7ebe9);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .quick-icon svg {
      width: 47px;
      height: 47px;
      stroke-width: 3.3;
    }

    .progress-panel {
      height: 195px;
      padding: 29px 27px 20px;
    }

    .chapter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .chapter-title {
      min-width: 0;
      color: #14100d;
      font-size: 34px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chapter-pills {
      display: flex;
      gap: 23px;
      flex: 0 0 auto;
    }

    .small-pill {
      width: 116px;
      height: 47px;
      border: 1px solid rgba(190, 174, 156, 0.48);
      border-radius: 24px;
      background: rgba(250, 244, 236, 0.82);
      color: #2e2923;
      font-size: 21px;
      line-height: 47px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76);
    }

    .chapter-progress {
      position: relative;
      margin-top: 41px;
      height: 20px;
    }

    .chapter-track {
      position: absolute;
      left: 0;
      right: 2px;
      top: 8px;
      height: 7px;
      border-radius: 999px;
      background: var(--surface-rail);
    }

    .chapter-fill {
      position: absolute;
      left: 0;
      top: 8px;
      width: 42%;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .chapter-thumb {
      position: absolute;
      left: calc(42% - 17px);
      top: -4px;
      width: 34px;
      height: 34px;
      border: 7px solid var(--primary);
      border-radius: 50%;
      background: #fdf8f1;
      box-shadow: 0 4px 10px rgba(32, 116, 158, 0.24);
    }

    .chapter-percent {
      margin-top: 23px;
      color: #625a51;
      font-size: 23px;
      line-height: 1;
    }

    .module-panel {
      height: 141px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      padding: 0 30px;
    }

    .module-item {
      display: grid;
      justify-items: center;
      gap: 13px;
      color: #14110e;
      font-size: 24px;
      line-height: 1;
    }

    .module-icon {
      width: 65px;
      height: 65px;
      display: grid;
      place-items: center;
      border-radius: 19px;
      background: linear-gradient(180deg, #f0f1ee, #e8ebe8);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .module-icon svg {
      width: 39px;
      height: 39px;
      stroke-width: 3.4;
    }

    .brightness-panel {
      position: absolute;
      top: 39px;
      right: 17px;
      width: 129px;
      height: 551px;
      padding: 21px 0 22px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 252, 248, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 5px 18px rgba(92, 71, 50, 0.06);
      text-align: center;
    }

    .brightness-title {
      color: #17130f;
      font-size: 23px;
      font-weight: 600;
      line-height: 1;
    }

    .sun-icon {
      width: 45px;
      height: 45px;
      margin: 43px auto 0;
      color: #181511;
    }

    .sun-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brightness-rail {
      position: relative;
      width: 8px;
      height: 215px;
      margin: 31px auto 0;
      border-radius: 999px;
      background: #e9ddd0;
      overflow: visible;
    }

    .brightness-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56%;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
    }

    .brightness-thumb {
      position: absolute;
      left: 50%;
      bottom: calc(56% - 17px);
      width: 34px;
      height: 34px;
      transform: translateX(-50%);
      border: 9px solid #f4f3ee;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 5px 11px rgba(38, 88, 110, 0.24);
    }

    .auto-letter {
      width: 55px;
      height: 55px;
      margin: 42px auto 0;
      border-radius: 50%;
      background: rgba(250, 244, 236, 0.86);
      color: #17130f;
      font-family: var(--sans);
      font-size: 29px;
      line-height: 55px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76), 0 2px 8px rgba(93, 72, 51, 0.06);
    }

    .system-label {
      margin-top: 34px;
      color: #17130f;
      font-size: 25px;
      line-height: 1;
    }

    .bottom-readout {
      position: absolute;
      left: 44px;
      right: 44px;
      bottom: 17px;
      display: flex;
      justify-content: space-between;
      color: #655d54;
      font-family: var(--sans);
      font-size: 23px;
      line-height: 1;
    }

    .bottom-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary) 0 38%, rgba(212, 201, 188, 0.52) 38% 100%);
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="阅读控制层">
    <div class="reading-haze" aria-hidden="true"></div>
    <div class="ambient-top" aria-hidden="true"></div>

    <header class="status-row" aria-label="阅读状态">
      <span>长夜余火 · 第 32 章</span>
      <span>10:30</span>
    </header>

    <section class="top-card" aria-label="顶部控制栏">
      <button class="top-icon" type="button" aria-label="返回">
        <svg viewBox="0 0 48 48"><path d="M29 10 15 24l14 14"></path><path d="M16 24h27"></path></svg>
      </button>
      <div class="book-info">
        <h1>长夜余火</h1>
        <p class="source-line">起点中文网 · 第 32 章</p>
      </div>
      <button class="swap-button" type="button" aria-label="换源">
        <svg viewBox="0 0 48 48"><path d="M11 16h22l-6-6"></path><path d="M37 32H15l6 6"></path><path d="M33 10l6 6-6 6"></path><path d="M15 38l-6-6 6-6"></path></svg>
        <span>换源</span>
      </button>
      <button class="more-dots" type="button" aria-label="更多">
        <span></span><span></span><span></span>
      </button>
    </section>

    <article class="reading-copy" aria-label="阅读正文">
      <p>雨，下了一整夜。</p>
      <p>城市像是被泼了一盆凉水，街灯昏黄，水面反着光，连呼吸都带着潮气。</p>
      <p>他站在巷口，手里攥着那封信。纸已经被雨水润湿，边角微微卷起，字迹却依旧清晰。</p>
      <p>“等你回来。”</p>
      <p>没有署名，只有短短四个字。</p>
      <p>他笑了笑，笑得很轻，像是自言自语。然后转身，沿着雨声走进夜里。</p>
    </article>

    <section class="control-sheet" aria-label="阅读控制面板">
      <div class="grabber" aria-hidden="true"></div>
      <div class="control-main">
        <section class="panel quick-panel" aria-label="快捷操作">
          <button class="quick-action" type="button">
            <span class="quick-icon"><svg viewBox="0 0 48 48"><circle cx="21" cy="21" r="12"></circle><path d="M31 31 42 42"></path></svg></span>
            <span>搜索</span>
          </button>
          <button class="quick-action" type="button">
            <span class="quick-icon"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="17"></circle><path d="M22 16v16l12-8-12-8Z" fill="currentColor" stroke="none"></path><path d="M9 24h4M35 24h4M24 9v4M24 35v4"></path></svg></span>
            <span>自动翻页</span>
          </button>
          <button class="quick-action" type="button">
            <span class="quick-icon"><svg viewBox="0 0 48 48"><path d="M33 8h7v7"></path><path d="M8 22v-4a10 10 0 0 1 10-10h20"></path><path d="M15 40H8v-7"></path><path d="M40 26v4a10 10 0 0 1-10 10H10"></path></svg></span>
            <span>替换</span>
          </button>
        </section>

        <section class="panel progress-panel" aria-label="章节进度">
          <div class="chapter-row">
            <div class="chapter-title">第 32 章 雨夜</div>
            <div class="chapter-pills">
              <button class="small-pill" type="button">上一章</button>
              <button class="small-pill" type="button">下一章</button>
            </div>
          </div>
          <div class="chapter-progress" aria-hidden="true">
            <span class="chapter-track"></span>
            <span class="chapter-fill"></span>
            <span class="chapter-thumb"></span>
          </div>
          <div class="chapter-percent">本章 38%</div>
        </section>

        <nav class="panel module-panel" aria-label="底部模块导航">
          <button class="module-item" type="button">
            <span class="module-icon"><svg viewBox="0 0 48 48"><path d="M13 12h22"></path><path d="M13 24h22"></path><path d="M13 36h22"></path><path d="M7 12h.01M7 24h.01M7 36h.01"></path></svg></span>
            <span>目录</span>
          </button>
          <button class="module-item" type="button">
            <span class="module-icon"><svg viewBox="0 0 48 48"><path d="M12 26v-4"></path><path d="M18 34V14"></path><path d="M24 39V9"></path><path d="M30 34V14"></path><path d="M36 26v-4"></path></svg></span>
            <span>朗读</span>
          </button>
          <button class="module-item" type="button">
            <span class="module-icon"><svg viewBox="0 0 48 48"><path d="M8 35 18 12h2l10 23"></path><path d="M12 27h14"></path><path d="M31 35V20"></path><path d="M31 20c7 0 9 3 9 7v8"></path></svg></span>
            <span>界面</span>
          </button>
          <button class="module-item" type="button">
            <span class="module-icon"><svg viewBox="0 0 48 48"><path d="M24 7 39 15v18l-15 8-15-8V15l15-8Z"></path><circle cx="24" cy="24" r="6"></circle></svg></span>
            <span>设置</span>
          </button>
        </nav>
      </div>

      <aside class="brightness-panel" aria-label="亮度控制">
        <div class="brightness-title">亮度</div>
        <div class="sun-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="8"></circle><path d="M24 4v7M24 37v7M4 24h7M37 24h7M9.8 9.8l5 5M33.2 33.2l5 5M38.2 9.8l-5 5M14.8 33.2l-5 5"></path></svg>
        </div>
        <div class="brightness-rail" aria-hidden="true">
          <span class="brightness-fill"></span>
          <span class="brightness-thumb"></span>
        </div>
        <div class="auto-letter">A</div>
        <div class="system-label">系统</div>
      </aside>
    </section>

    <footer class="bottom-readout" aria-label="阅读页底部信息">
      <span>38%</span>
      <span>第 32 /128 章</span>
    </footer>
    <div class="bottom-line" aria-hidden="true"></div>
  </main>
</body>
</html>
