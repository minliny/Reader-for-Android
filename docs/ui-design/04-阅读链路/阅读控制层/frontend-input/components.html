<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>阅读控制层组件拆分</title>
    <link rel="stylesheet" href="./components.css">
  </head>
  <body>
    <main class="rc-component-reference" aria-label="阅读控制层组件拆分">
<!-- Component: ReaderStatusRow -->
<header class="rc-status-row" aria-label="阅读状态">
  <span>长夜余火 · 第 32 章</span>
  <span>10:30</span>
</header>

<!-- Component: ReaderTopControlBar -->
<section class="rc-top-control-bar" aria-label="顶部控制栏">
  <button class="rc-top-icon" type="button" aria-label="返回">
    <svg viewBox="0 0 48 48"><path d="M29 10 15 24l14 14"></path><path d="M16 24h27"></path></svg>
  </button>
  <div class="rc-book-info">
    <h1 class="rc-book-title">长夜余火</h1>
    <p class="rc-source-line">起点中文网 · 第 32 章</p>
  </div>
  <button class="rc-swap-button" type="button" aria-label="换源">
    <svg viewBox="0 0 48 48"><path d="M11 16h22l-6-6"></path><path d="M37 32H15l6 6"></path><path d="M33 10l6 6-6 6"></path><path d="M15 38l-6-6 6-6"></path></svg>
    <span>换源</span>
  </button>
  <button class="rc-more-dots" type="button" aria-label="更多">
    <span></span><span></span><span></span>
  </button>
</section>

<!-- Component: ReadingTextLayer -->
<article class="rc-reading-text" aria-label="阅读正文">
  <p>雨，下了一整夜。</p>
  <p>城市像是被泼了一盆凉水，街灯昏黄，水面反着光，连呼吸都带着潮气。</p>
</article>

<!-- Component: QuickActionPanel -->
<section class="rc-panel rc-quick-action-panel" aria-label="快捷操作">
  <button class="rc-quick-action" type="button">
    <span class="rc-quick-icon"><svg viewBox="0 0 48 48"><circle cx="21" cy="21" r="12"></circle><path d="M31 31 42 42"></path></svg></span>
    <span>搜索</span>
  </button>
  <button class="rc-quick-action" type="button">
    <span class="rc-quick-icon"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="17"></circle><path d="M22 16v16l12-8-12-8Z" fill="currentColor" stroke="none"></path><path d="M9 24h4M35 24h4M24 9v4M24 35v4"></path></svg></span>
    <span>自动翻页</span>
  </button>
  <button class="rc-quick-action" type="button">
    <span class="rc-quick-icon"><svg viewBox="0 0 48 48"><path d="M33 8h7v7"></path><path d="M8 22v-4a10 10 0 0 1 10-10h20"></path><path d="M15 40H8v-7"></path><path d="M40 26v4a10 10 0 0 1-10 10H10"></path></svg></span>
    <span>替换</span>
  </button>
</section>

<!-- Component: ChapterProgressPanel -->
<section class="rc-panel rc-chapter-panel" aria-label="章节进度">
  <div class="rc-chapter-row">
    <div class="rc-chapter-title">第 32 章 雨夜</div>
    <div class="rc-chapter-pills">
      <button class="rc-chapter-pill" type="button">上一章</button>
      <button class="rc-chapter-pill" type="button">下一章</button>
    </div>
  </div>
  <div class="rc-chapter-progress" style="--value: 42%" aria-hidden="true">
    <span class="rc-chapter-track"></span>
    <span class="rc-chapter-fill"></span>
    <span class="rc-chapter-thumb"></span>
  </div>
  <div class="rc-chapter-percent">本章 38%</div>
</section>

<!-- Component: ModuleNav -->
<nav class="rc-panel rc-module-nav" aria-label="底部模块导航">
  <button class="rc-module-item is-active" type="button" aria-current="page">
    <span class="rc-module-icon"><svg viewBox="0 0 48 48"><path d="M13 12h22"></path><path d="M13 24h22"></path><path d="M13 36h22"></path><path d="M7 12h.01M7 24h.01M7 36h.01"></path></svg></span>
    <span>目录</span>
  </button>
  <button class="rc-module-item" type="button">
    <span class="rc-module-icon"><svg viewBox="0 0 48 48"><path d="M12 26v-4"></path><path d="M18 34V14"></path><path d="M24 39V9"></path><path d="M30 34V14"></path><path d="M36 26v-4"></path></svg></span>
    <span>朗读</span>
  </button>
  <button class="rc-module-item" type="button">
    <span class="rc-module-icon"><svg viewBox="0 0 48 48"><path d="M8 35 18 12h2l10 23"></path><path d="M12 27h14"></path><path d="M31 35V20"></path><path d="M31 20c7 0 9 3 9 7v8"></path></svg></span>
    <span>界面</span>
  </button>
  <button class="rc-module-item" type="button">
    <span class="rc-module-icon"><svg viewBox="0 0 48 48"><path d="M24 7 39 15v18l-15 8-15-8V15l15-8Z"></path><circle cx="24" cy="24" r="6"></circle></svg></span>
    <span>设置</span>
  </button>
</nav>

<!-- Component: BrightnessPanel -->
<aside class="rc-brightness-panel" aria-label="亮度控制">
  <div class="rc-brightness-title">亮度</div>
  <div class="rc-sun-icon" aria-hidden="true">
    <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="8"></circle><path d="M24 4v7M24 37v7M4 24h7M37 24h7M9.8 9.8l5 5M33.2 33.2l5 5M38.2 9.8l-5 5M14.8 33.2l-5 5"></path></svg>
  </div>
  <div class="rc-brightness-rail" style="--value: 56%" aria-hidden="true">
    <span class="rc-brightness-fill"></span>
    <span class="rc-brightness-thumb"></span>
  </div>
  <div class="rc-auto-letter">A</div>
  <div class="rc-system-label">系统</div>
</aside>
    </main>
  </body>
</html>
